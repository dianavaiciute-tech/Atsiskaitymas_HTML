<!doctype html>
<html>
  <head>
    <title>1 praktinė užduotis</title>
  </head>
  <body>
    <!--Tai yra antarštė-->
    <h1>Eilėraštis</h1>
    <h2>Pirma eilutė</h2>
    <p>Mano batai <em>buvo</em> du,</p>
    <h2>Antra eilutė</h2>
    <p>Vienas dingo - nerandu,</p>
    <h2>Likusios eilutės</h2>
    <p>
      Aš su vienu batuku <br />
      Niekur eiti negaliu.
    </p>
    <h2>Likusios eilutės - kitaip</h2>
    <p>
      <b>Aš</b> su vienu <strong>batuku</strong> <br />
      <i>Niekur</i> <mark>eiti</mark>
      <a href="https://www.google.com/">negaliu</a>.
    </p>
  </body>
</html>
