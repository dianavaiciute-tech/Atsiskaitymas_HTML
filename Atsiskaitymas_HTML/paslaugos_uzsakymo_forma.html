              <td align="40%">
                <h1>TAVO GAMTA</h1>
              </td>

      <tr>
        <!--Kairysis meniu-->
        <td width="20%" valign="top" bgcolor="#FFFFFF">

          >
        </td>
        <!--Forma-->
        <td valign="top" align="40%" bgcolor="#D9E6F2">
          <h2>Paslaugos užsakymas</h2>

          <form action="#" method="post">
            <!-- Paslauga dropdown -->
            <label for="paslauga">Paslauga<font color="red">*</font>:</label
            ><br />
            <select name="paslauga" id="paslauga" required>
              <option value=""></option>
              <option value="skrydis-dronu">Skrydis dronu</option>
              <option value="zemelapio-sudarymas">
                Žemėlapio sudarymas
              </option></select
            ><br /><br />

            <!-- Data -->
            <label for="data"
              >Paslaugos įvykdymo data:<font color="red">*</font></label
            ><br />
            <input type="date" id="data" name="data" required /><br /><br />

            <!-- Teksto laukeliai -->
            <label for="vardas">Vardas:<font color="red">*</font></label
            ><br />
            <input
              type="text"
              id="vardas"
              name="vardas"
              placeholder="Jūsų vardas"
              required
            /><br /><br />

            <label for="pavarde">Pavardė:<font color="red">*</font></label
            ><br />
            <input
              type="text"
              id="pavarde"
              name="pavarde"
              placeholder="Jūsų pavardė"
              required
            /><br /><br />

            <label for="email"
              >El. pašto adresas:<font color="red">*</font></label
            ><br />
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Jūsų el. pašto adresas"
              required
            /><br /><br />

            <label for="telefonas"
              >Tel. numeris:<font color="red">*</font></label
            ><br />
            <input
              type="tel"
              id="telefonas"
              name="telefonas"
              placeholder="Jūsų telefono numeris"
              required
            /><br /><br />

            <input type="submit" value="Užsakyti" />
          </form>
        </td>
      </tr>
      <!--Footer'is-->
      <tr bgcolor="#2C6BA6">
        <td colspan="2" align="center">
